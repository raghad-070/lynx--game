<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcade Quiz</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  background: #623C8F;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  overflow: hidden;
}

/* النجوم */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size:40px 40px;
  opacity:.15;
  animation:moveStars 80s linear infinite;
}

@keyframes moveStars{
  from{transform:translateY(0)}
  to{transform:translateY(-1000px)}
}

/* جهاز الآركيد */
.arcade-container{
  position:relative;
  width:100%;
  max-width:500px;
  height:100vh;
}

/* صورة الآركيد */
.arcade-img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
  z-index:1;
}

/* المحتوى */
.content{
  position:absolute;
  top:30%;
  left:50%;
  transform:translateX(-50%);
  width:52%;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:2;
}

/* ⭐ وضع الصيانة داخل الجهاز */
.maintenance-box{
  background:white;
  padding:20px;
  border-radius:12px;
  font-weight:bold;
  color:#000;
  font-size:18px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* اخفاء الاسئلة */
.hidden{
  display:none;
}

/* موبايل */
@media(max-width:768px){
.content{
  width:58%;
  top:29%;
}
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="arcade-container">

  <img src="https://raw.githubusercontent.com/raghad-070/lynx--game/main/arcade.png.jpg" class="arcade-img">

  <div class="content" id="content">

    <!-- 🔧 وضع الصيانة -->
    <div class="maintenance-box">
      ⚠️ الجهاز قيد الصيانة<br><br>
      سنعود قريباً
    </div>

    <!-- 🎮 الأسئلة (مخفية الآن) -->
    <div id="game" class="hidden">
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
    </div>

  </div>

</div>

<script>

// 🚫 لا يتم تشغيل اللعبة (وضع صيانة)

</script>

</body>
</html>
